name: Build Push Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-push-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Order Service
      - name: Build Order Service
        run: |
          docker build -t $DOCKER_USERNAME/order-service:${{ github.run_number }} ./order-service
          docker tag $DOCKER_USERNAME/order-service:${{ github.run_number }} $DOCKER_USERNAME/order-service:latest

      - name: Push Order Service
        run: |
          docker push $DOCKER_USERNAME/order-service:${{ github.run_number }}
          docker push $DOCKER_USERNAME/order-service:latest

      # Build Inventory Service
      - name: Build Inventory Service
        run: |
          docker build -t $DOCKER_USERNAME/inventory-service:${{ github.run_number }} ./inventory-service
          docker tag $DOCKER_USERNAME/inventory-service:${{ github.run_number }} $DOCKER_USERNAME/inventory-service:latest

      - name: Push Inventory Service
        run: |
          docker push $DOCKER_USERNAME/inventory-service:${{ github.run_number }}
          docker push $DOCKER_USERNAME/inventory-service:latest

      # Build Notification Service
      - name: Build Notification Service
        run: |
          docker build -t $DOCKER_USERNAME/notification-service:${{ github.run_number }} ./notification-service
          docker tag $DOCKER_USERNAME/notification-service:${{ github.run_number }} $DOCKER_USERNAME/notification-service:latest

      - name: Push Notification Service
        run: |
          docker push $DOCKER_USERNAME/notification-service:${{ github.run_number }}
          docker push $DOCKER_USERNAME/notification-service:latest

      # Build API Gateway
      - name: Build API Gateway
        run: |
          docker build -t $DOCKER_USERNAME/api-gateway:${{ github.run_number }} ./api-gateway
          docker tag $DOCKER_USERNAME/api-gateway:${{ github.run_number }} $DOCKER_USERNAME/api-gateway:latest

      - name: Push API Gateway
        run: |
          docker push $DOCKER_USERNAME/api-gateway:${{ github.run_number }}
          docker push $DOCKER_USERNAME/api-gateway:latest

      - name: Deploy to Minikube
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment order-service -n order-system
          kubectl rollout restart deployment inventory-service -n order-system
          kubectl rollout restart deployment notification-service -n order-system
          kubectl rollout restart deployment api-gateway -n order-system

      - name: Verify Deployment
        run: |
          kubectl get pods -n order-system
          kubectl get svc -n order-system