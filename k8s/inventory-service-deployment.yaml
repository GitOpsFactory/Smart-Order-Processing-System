apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: order-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: YOUR_DOCKER_USERNAME/inventory-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: order-system
spec:
  selector:
    app: inventory-service
  ports:
  - port: 5002
    targetPort: 5002
  type: ClusterIP