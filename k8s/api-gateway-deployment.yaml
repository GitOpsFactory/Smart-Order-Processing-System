apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: order-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: bkuslapur/api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: order-system
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8080
  type: NodePort